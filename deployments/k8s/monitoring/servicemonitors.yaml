apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: azums-reverse-proxy
  namespace: azums
  labels:
    app.kubernetes.io/name: azums
spec:
  namespaceSelector:
    matchNames:
      - azums
  selector:
    matchLabels:
      app: reverse-proxy
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
---
