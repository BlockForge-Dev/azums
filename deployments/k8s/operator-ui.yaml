apiVersion: v1
kind: Service
metadata:
  name: operator-ui
  namespace: azums
  labels:
    app: operator-ui
spec:
  selector:
    app: operator-ui
  ports:
    - name: http
      port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: operator-ui
  namespace: azums
  labels:
    app: operator-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: operator-ui
  template:
    metadata:
      labels:
        app: operator-ui
    spec:
      containers:
        - name: operator-ui
          image: ghcr.io/blockforge-dev/azums/operator_ui_next:main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: OPERATOR_UI_BACKEND_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: azums-platform-config
                  key: OPERATOR_UI_BACKEND_ORIGIN
            - name: NEXT_PUBLIC_PASSWORD_RESET_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: azums-platform-config
                  key: OPERATOR_UI_PASSWORD_RESET_ENABLED
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "8083"
          readinessProbe:
            httpGet:
              path: /
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
