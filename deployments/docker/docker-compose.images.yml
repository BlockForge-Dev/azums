services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AZUMS_POSTGRES_DB:-azums}
      POSTGRES_USER: ${AZUMS_POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${AZUMS_POSTGRES_PASSWORD:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../crates/postgresflow/crates/postgresflow/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AZUMS_POSTGRES_USER:-app} -d ${AZUMS_POSTGRES_DB:-azums}"]
      interval: 5s
      timeout: 5s
      retries: 20

  ingress_api:
    image: azums/ingress_api:${AZUMS_IMAGE_TAG:-local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${AZUMS_DATABASE_URL:-postgres://app:app@postgres:5432/azums}
      INGRESS_API_BIND: 0.0.0.0:8081
      INGRESS_DB_MAX_CONNECTIONS: ${INGRESS_DB_MAX_CONNECTIONS:-8}
      INGRESS_BEARER_TOKEN: ${INGRESS_BEARER_TOKEN:-dev-ingress-token}
      INGRESS_DEBUG_AUTH_HEADER_ENABLED: ${INGRESS_DEBUG_AUTH_HEADER_ENABLED:-false}
      INGRESS_PRINCIPAL_SUBMITTER_BINDINGS: ${INGRESS_PRINCIPAL_SUBMITTER_BINDINGS:-ingress-service=internal_service}
      INGRESS_REQUIRE_PRINCIPAL_SUBMITTER_BINDING: ${INGRESS_REQUIRE_PRINCIPAL_SUBMITTER_BINDING:-true}
      INGRESS_PRINCIPAL_TENANT_BINDINGS: ${INGRESS_PRINCIPAL_TENANT_BINDINGS:-ingress-service=tenant_demo|tenant_ws_*}
      INGRESS_REQUIRE_PRINCIPAL_TENANT_BINDING: ${INGRESS_REQUIRE_PRINCIPAL_TENANT_BINDING:-true}
      INGRESS_REQUIRE_PRINCIPAL_ID: ${INGRESS_REQUIRE_PRINCIPAL_ID:-true}
      INGRESS_REQUIRE_SUBMITTER_KIND: ${INGRESS_REQUIRE_SUBMITTER_KIND:-true}
      INGRESS_REQUIRE_API_KEY_FOR_API_KEY_HOLDER: ${INGRESS_REQUIRE_API_KEY_FOR_API_KEY_HOLDER:-true}
      INGRESS_API_ALLOWED_SUBMITTERS: ${INGRESS_API_ALLOWED_SUBMITTERS:-api_key_holder,internal_service,wallet_backend}
      INGRESS_WEBHOOK_ALLOWED_SUBMITTERS: ${INGRESS_WEBHOOK_ALLOWED_SUBMITTERS:-signed_webhook_sender,internal_service}
      INGRESS_INTENT_ROUTES: ${INGRESS_INTENT_ROUTES:-solana.transfer.v1=adapter_solana;solana.broadcast.v1=adapter_solana}
      INGRESS_INTENT_SCHEMAS: ${INGRESS_INTENT_SCHEMAS:-solana.transfer.v1=solana.transfer.v1;solana.broadcast.v1=solana.broadcast.v1}
      INGRESS_REQUIRE_SCHEMA_FOR_ALL_ROUTES: ${INGRESS_REQUIRE_SCHEMA_FOR_ALL_ROUTES:-true}
      INGRESS_DEFAULT_QUOTA_PLAN: ${INGRESS_DEFAULT_QUOTA_PLAN:-developer}
      INGRESS_DEFAULT_QUOTA_ACCESS_MODE: ${INGRESS_DEFAULT_QUOTA_ACCESS_MODE:-free_play}
      INGRESS_DEFAULT_FREE_PLAY_LIMIT: ${INGRESS_DEFAULT_FREE_PLAY_LIMIT:-500}
      INGRESS_DEFAULT_EXECUTION_POLICY: ${INGRESS_DEFAULT_EXECUTION_POLICY:-customer_signed}
      INGRESS_DEFAULT_SPONSORED_MONTHLY_CAP_REQUESTS: ${INGRESS_DEFAULT_SPONSORED_MONTHLY_CAP_REQUESTS:-10000}
      INGRESS_EXECUTION_POLICY_ENFORCEMENT_ENABLED: ${INGRESS_EXECUTION_POLICY_ENFORCEMENT_ENABLED:-true}
      INGRESS_EXECUTION_POLICY_CANARY_TENANTS: ${INGRESS_EXECUTION_POLICY_CANARY_TENANTS:-}
      EXECUTION_DISPATCH_QUEUE: ${EXECUTION_DISPATCH_QUEUE:-execution.dispatch}
      EXECUTION_CALLBACK_QUEUE: ${EXECUTION_CALLBACK_QUEUE:-execution.callback}
      EXECUTION_RETRY_MAX_ATTEMPTS: ${EXECUTION_RETRY_MAX_ATTEMPTS:-5}
      EXECUTION_RETRY_BASE_DELAY_MS: ${EXECUTION_RETRY_BASE_DELAY_MS:-1000}
      EXECUTION_RETRY_MAX_DELAY_MS: ${EXECUTION_RETRY_MAX_DELAY_MS:-60000}
      EXECUTION_RETRY_JITTER_PERCENT: ${EXECUTION_RETRY_JITTER_PERCENT:-0}
      OBS_ENV: ${OBS_ENV:-dev}
      OBS_LOG_FILTER: ${OBS_LOG_FILTER:-info}
      OBS_LOG_JSON: ${OBS_LOG_JSON:-false}
      OBS_METRICS_PREFIX: ${OBS_METRICS_PREFIX:-platform}
      OBS_REQUEST_ID_HEADER: ${OBS_REQUEST_ID_HEADER:-x-request-id}
      OBS_CORRELATION_ID_HEADER: ${OBS_CORRELATION_ID_HEADER:-x-correlation-id}
    networks:
      default:
        aliases:
          - ingress-api
    ports:
      - "${INGRESS_HOST_PORT:-18081}:8081"

  status_api:
    image: azums/status_api:${AZUMS_IMAGE_TAG:-local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${AZUMS_DATABASE_URL:-postgres://app:app@postgres:5432/azums}
      STATUS_API_BIND: 0.0.0.0:8082
      STATUS_API_DB_MAX_CONNECTIONS: ${STATUS_API_DB_MAX_CONNECTIONS:-8}
      STATUS_API_BEARER_TOKEN: ${STATUS_API_BEARER_TOKEN:-dev-status-token}
      STATUS_API_DEBUG_AUTH_HEADER_ENABLED: ${STATUS_API_DEBUG_AUTH_HEADER_ENABLED:-false}
      STATUS_API_REQUIRE_BEARER_AUTH: ${STATUS_API_REQUIRE_BEARER_AUTH:-true}
      STATUS_API_PRINCIPAL_ROLE_BINDINGS: ${STATUS_API_PRINCIPAL_ROLE_BINDINGS:-demo-operator=admin;workspace-*-owner=admin;workspace-*-admin=admin;workspace-*-developer=operator;workspace-*-viewer=viewer}
      STATUS_API_REQUIRE_PRINCIPAL_ROLE_BINDING: ${STATUS_API_REQUIRE_PRINCIPAL_ROLE_BINDING:-true}
      STATUS_API_PRINCIPAL_TENANT_BINDINGS: ${STATUS_API_PRINCIPAL_TENANT_BINDINGS:-demo-operator=tenant_demo|tenant_ws_*;workspace-*=tenant_ws_*}
      STATUS_API_REQUIRE_PRINCIPAL_TENANT_BINDING: ${STATUS_API_REQUIRE_PRINCIPAL_TENANT_BINDING:-true}
      STATUS_API_REDACT_FAILURE_PROVIDER_DETAILS_FOR_VIEWER: ${STATUS_API_REDACT_FAILURE_PROVIDER_DETAILS_FOR_VIEWER:-true}
      STATUS_API_REDACT_CALLBACK_ERROR_DETAILS_FOR_VIEWER: ${STATUS_API_REDACT_CALLBACK_ERROR_DETAILS_FOR_VIEWER:-true}
      STATUS_API_ENABLE_REPLAY: ${STATUS_API_ENABLE_REPLAY:-true}
      STATUS_API_REPLAY_DB_MAX_CONNECTIONS: ${STATUS_API_REPLAY_DB_MAX_CONNECTIONS:-4}
      STATUS_API_INTENT_ROUTES: ${STATUS_API_INTENT_ROUTES:-solana.transfer.v1=adapter_solana;solana.broadcast.v1=adapter_solana}
      STATUS_API_ALLOWED_ADAPTERS: ${STATUS_API_ALLOWED_ADAPTERS:-adapter_solana}
      EXECUTION_DISPATCH_QUEUE: ${EXECUTION_DISPATCH_QUEUE:-execution.dispatch}
      EXECUTION_CALLBACK_QUEUE: ${EXECUTION_CALLBACK_QUEUE:-execution.callback}
      EXECUTION_RETRY_MAX_ATTEMPTS: ${EXECUTION_RETRY_MAX_ATTEMPTS:-5}
      EXECUTION_RETRY_BASE_DELAY_MS: ${EXECUTION_RETRY_BASE_DELAY_MS:-1000}
      EXECUTION_RETRY_MAX_DELAY_MS: ${EXECUTION_RETRY_MAX_DELAY_MS:-60000}
      EXECUTION_RETRY_JITTER_PERCENT: ${EXECUTION_RETRY_JITTER_PERCENT:-0}
      OBS_ENV: ${OBS_ENV:-dev}
      OBS_LOG_FILTER: ${OBS_LOG_FILTER:-info}
      OBS_LOG_JSON: ${OBS_LOG_JSON:-false}
      OBS_METRICS_PREFIX: ${OBS_METRICS_PREFIX:-platform}
      OBS_REQUEST_ID_HEADER: ${OBS_REQUEST_ID_HEADER:-x-request-id}
      OBS_CORRELATION_ID_HEADER: ${OBS_CORRELATION_ID_HEADER:-x-correlation-id}
    networks:
      default:
        aliases:
          - status-api
    ports:
      - "${STATUS_HOST_PORT:-18082}:8082"

  operator_ui_backend:
    image: azums/operator_ui:${AZUMS_IMAGE_TAG:-local}
    restart: unless-stopped
    depends_on:
      status_api:
        condition: service_started
      reverse_proxy:
        condition: service_started
    environment:
      OPERATOR_UI_BIND: 0.0.0.0:8083
      OPERATOR_UI_STATUS_BASE_URL: ${OPERATOR_UI_STATUS_BASE_URL:-http://status-api:8082}
      OPERATOR_UI_STATUS_BEARER_TOKEN: ${OPERATOR_UI_STATUS_BEARER_TOKEN:-dev-status-token}
      OPERATOR_UI_TENANT_ID: ${OPERATOR_UI_TENANT_ID:-tenant_demo}
      OPERATOR_UI_PRINCIPAL_ID: ${OPERATOR_UI_PRINCIPAL_ID:-demo-operator}
      OPERATOR_UI_PRINCIPAL_ROLE: ${OPERATOR_UI_PRINCIPAL_ROLE:-admin}
      OPERATOR_UI_STATUS_PRINCIPAL_MODE: ${OPERATOR_UI_STATUS_PRINCIPAL_MODE:-workspace}
      OPERATOR_UI_STATUS_TIMEOUT_MS: ${OPERATOR_UI_STATUS_TIMEOUT_MS:-15000}
      OPERATOR_UI_INGRESS_BASE_URL: ${OPERATOR_UI_INGRESS_BASE_URL:-http://reverse-proxy:8000}
      OPERATOR_UI_INGRESS_BEARER_TOKEN: ${OPERATOR_UI_INGRESS_BEARER_TOKEN:-dev-ingress-token}
      OPERATOR_UI_INGRESS_PRINCIPAL_ID: ${OPERATOR_UI_INGRESS_PRINCIPAL_ID:-ingress-service}
      OPERATOR_UI_INGRESS_SUBMITTER_KIND: ${OPERATOR_UI_INGRESS_SUBMITTER_KIND:-internal_service}
      OPERATOR_UI_INGRESS_FALLBACK_PRINCIPAL_ID: ${OPERATOR_UI_INGRESS_FALLBACK_PRINCIPAL_ID:-}
      OPERATOR_UI_INGRESS_FALLBACK_SUBMITTER_KIND: ${OPERATOR_UI_INGRESS_FALLBACK_SUBMITTER_KIND:-}
      OPERATOR_UI_REQUIRE_DURABLE_METERING: ${OPERATOR_UI_REQUIRE_DURABLE_METERING:-false}
      OPERATOR_UI_ENFORCE_WORKSPACE_SOLANA_RPC: ${OPERATOR_UI_ENFORCE_WORKSPACE_SOLANA_RPC:-true}
      OPERATOR_UI_SANDBOX_SOLANA_RPC_URL: ${OPERATOR_UI_SANDBOX_SOLANA_RPC_URL:-https://api.devnet.solana.com}
      OPERATOR_UI_STAGING_SOLANA_RPC_URL: ${OPERATOR_UI_STAGING_SOLANA_RPC_URL:-}
      OPERATOR_UI_PRODUCTION_SOLANA_RPC_URL: ${OPERATOR_UI_PRODUCTION_SOLANA_RPC_URL:-}
      OPERATOR_UI_RECONCILIATION_ROLLOUT_MODE: ${OPERATOR_UI_RECONCILIATION_ROLLOUT_MODE:-customer_visible}
      OPERATOR_UI_REQUIRE_EMAIL_VERIFICATION: ${OPERATOR_UI_REQUIRE_EMAIL_VERIFICATION:-false}
      OPERATOR_UI_PASSWORD_RESET_ENABLED: ${OPERATOR_UI_PASSWORD_RESET_ENABLED:-false}
      OPERATOR_UI_FLUTTERWAVE_SECRET_KEY: ${OPERATOR_UI_FLUTTERWAVE_SECRET_KEY:-}
      OPERATOR_UI_FLUTTERWAVE_WEBHOOK_HASH: ${OPERATOR_UI_FLUTTERWAVE_WEBHOOK_HASH:-}
      OPERATOR_UI_FLUTTERWAVE_BASE_URL: ${OPERATOR_UI_FLUTTERWAVE_BASE_URL:-https://api.flutterwave.com/v3}
      OPERATOR_UI_FLUTTERWAVE_EXPECTED_CURRENCY: ${OPERATOR_UI_FLUTTERWAVE_EXPECTED_CURRENCY:-}
      OPERATOR_UI_FLUTTERWAVE_FX_RATES_USD: ${OPERATOR_UI_FLUTTERWAVE_FX_RATES_USD:-USD=1;NGN=0.00066;GBP=1.27;CAD=0.74;JPY=0.0067}

  operator_ui:
    image: azums/operator_ui_next:${AZUMS_IMAGE_TAG:-local}
    restart: unless-stopped
    depends_on:
      operator_ui_backend:
        condition: service_started
    environment:
      OPERATOR_UI_BACKEND_ORIGIN: ${OPERATOR_UI_BACKEND_ORIGIN:-http://operator_ui_backend:8083}
      NEXT_PUBLIC_PASSWORD_RESET_ENABLED: ${OPERATOR_UI_PASSWORD_RESET_ENABLED:-false}

  execution_worker:
    image: azums/execution_worker:${AZUMS_IMAGE_TAG:-local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${AZUMS_DATABASE_URL:-postgres://app:app@postgres:5432/azums}
      EXECUTION_WORKER_MODE: ${EXECUTION_WORKER_MODE:-dispatch}
      EXECUTION_DB_MAX_CONNECTIONS: ${EXECUTION_DB_MAX_CONNECTIONS:-8}
      EXECUTION_DISPATCH_DB_MAX_CONNECTIONS: ${EXECUTION_DISPATCH_DB_MAX_CONNECTIONS:-8}
      EXECUTION_DISPATCH_BATCH_SIZE: ${EXECUTION_DISPATCH_BATCH_SIZE:-1}
      EXECUTION_ALLOWED_ADAPTERS: ${EXECUTION_ALLOWED_ADAPTERS:-adapter_solana}
      EXECUTION_DISPATCH_QUEUE: ${EXECUTION_DISPATCH_QUEUE:-execution.dispatch}
      EXECUTION_CALLBACK_QUEUE: ${EXECUTION_CALLBACK_QUEUE:-execution.callback}
      EXECUTION_WORKER_ID: ${EXECUTION_WORKER_ID:-execution-core-worker}
      EXECUTION_CALLBACK_WORKER_ID: ${EXECUTION_CALLBACK_WORKER_ID:-execution-callback-worker}
      EXECUTION_IDLE_SLEEP_MS: ${EXECUTION_IDLE_SLEEP_MS:-50}
      EXECUTION_CALLBACK_ALLOW_PRIVATE_DESTINATIONS: ${EXECUTION_CALLBACK_ALLOW_PRIVATE_DESTINATIONS:-false}
      EXECUTION_CALLBACK_ALLOWED_HOSTS: ${EXECUTION_CALLBACK_ALLOWED_HOSTS:-callbacks.example.com}
      EXECUTION_QUEUE_JOB_MAX_ATTEMPTS: ${EXECUTION_QUEUE_JOB_MAX_ATTEMPTS:-25}
      EXECUTION_QUEUE_RETRY_BASE_DELAY_SECS: ${EXECUTION_QUEUE_RETRY_BASE_DELAY_SECS:-1}
      EXECUTION_QUEUE_RETRY_MAX_DELAY_SECS: ${EXECUTION_QUEUE_RETRY_MAX_DELAY_SECS:-300}
      EXECUTION_RETRY_MAX_ATTEMPTS: ${EXECUTION_RETRY_MAX_ATTEMPTS:-5}
      EXECUTION_RETRY_BASE_DELAY_MS: ${EXECUTION_RETRY_BASE_DELAY_MS:-1000}
      EXECUTION_RETRY_MAX_DELAY_MS: ${EXECUTION_RETRY_MAX_DELAY_MS:-60000}
      EXECUTION_RETRY_JITTER_PERCENT: ${EXECUTION_RETRY_JITTER_PERCENT:-0}
      EXECUTION_DISPATCH_NOTIFY_MAX_WAIT_MS: ${EXECUTION_DISPATCH_NOTIFY_MAX_WAIT_MS:-500}
      SOLANA_SYNC_MAX_POLLS: ${SOLANA_SYNC_MAX_POLLS:-8}
      SOLANA_SYNC_POLL_DELAY_MS: ${SOLANA_SYNC_POLL_DELAY_MS:-1200}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      SOLANA_PLATFORM_SIGNING_ENABLED: ${SOLANA_PLATFORM_SIGNING_ENABLED:-false}

  execution_worker_replica:
    image: azums/execution_worker:${AZUMS_IMAGE_TAG:-local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${AZUMS_DATABASE_URL:-postgres://app:app@postgres:5432/azums}
      EXECUTION_WORKER_MODE: dispatch
      EXECUTION_DB_MAX_CONNECTIONS: ${EXECUTION_DB_MAX_CONNECTIONS:-8}
      EXECUTION_DISPATCH_DB_MAX_CONNECTIONS: ${EXECUTION_DISPATCH_DB_MAX_CONNECTIONS:-8}
      EXECUTION_DISPATCH_BATCH_SIZE: ${EXECUTION_DISPATCH_BATCH_SIZE:-1}
      EXECUTION_ALLOWED_ADAPTERS: ${EXECUTION_ALLOWED_ADAPTERS:-adapter_solana}
      EXECUTION_DISPATCH_QUEUE: ${EXECUTION_DISPATCH_QUEUE:-execution.dispatch}
      EXECUTION_CALLBACK_QUEUE: ${EXECUTION_CALLBACK_QUEUE:-execution.callback}
      EXECUTION_WORKER_ID: ${EXECUTION_WORKER_ID_REPLICA:-execution-core-worker-2}
      EXECUTION_CALLBACK_WORKER_ID: ${EXECUTION_CALLBACK_WORKER_ID:-execution-callback-worker}
      EXECUTION_IDLE_SLEEP_MS: ${EXECUTION_IDLE_SLEEP_MS:-50}
      EXECUTION_DISPATCH_NOTIFY_MAX_WAIT_MS: ${EXECUTION_DISPATCH_NOTIFY_MAX_WAIT_MS:-500}
      EXECUTION_QUEUE_JOB_MAX_ATTEMPTS: ${EXECUTION_QUEUE_JOB_MAX_ATTEMPTS:-25}
      EXECUTION_QUEUE_RETRY_BASE_DELAY_SECS: ${EXECUTION_QUEUE_RETRY_BASE_DELAY_SECS:-1}
      EXECUTION_QUEUE_RETRY_MAX_DELAY_SECS: ${EXECUTION_QUEUE_RETRY_MAX_DELAY_SECS:-300}
      EXECUTION_RETRY_MAX_ATTEMPTS: ${EXECUTION_RETRY_MAX_ATTEMPTS:-5}
      EXECUTION_RETRY_BASE_DELAY_MS: ${EXECUTION_RETRY_BASE_DELAY_MS:-1000}
      EXECUTION_RETRY_MAX_DELAY_MS: ${EXECUTION_RETRY_MAX_DELAY_MS:-60000}
      EXECUTION_RETRY_JITTER_PERCENT: ${EXECUTION_RETRY_JITTER_PERCENT:-0}
      SOLANA_SYNC_MAX_POLLS: ${SOLANA_SYNC_MAX_POLLS:-8}
      SOLANA_SYNC_POLL_DELAY_MS: ${SOLANA_SYNC_POLL_DELAY_MS:-1200}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      SOLANA_PLATFORM_SIGNING_ENABLED: ${SOLANA_PLATFORM_SIGNING_ENABLED:-false}

  execution_callback_worker:
    image: azums/execution_worker:${AZUMS_IMAGE_TAG:-local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${AZUMS_DATABASE_URL:-postgres://app:app@postgres:5432/azums}
      EXECUTION_WORKER_MODE: callback
      EXECUTION_DB_MAX_CONNECTIONS: ${EXECUTION_DB_MAX_CONNECTIONS:-8}
      EXECUTION_CALLBACK_DB_MAX_CONNECTIONS: ${EXECUTION_CALLBACK_DB_MAX_CONNECTIONS:-4}
      EXECUTION_CALLBACK_BATCH_SIZE: ${EXECUTION_CALLBACK_BATCH_SIZE:-4}
      EXECUTION_DISPATCH_QUEUE: ${EXECUTION_DISPATCH_QUEUE:-execution.dispatch}
      EXECUTION_CALLBACK_QUEUE: ${EXECUTION_CALLBACK_QUEUE:-execution.callback}
      EXECUTION_WORKER_ID: ${EXECUTION_WORKER_ID:-execution-core-worker}
      EXECUTION_CALLBACK_WORKER_ID: ${EXECUTION_CALLBACK_WORKER_ID:-execution-callback-worker}
      EXECUTION_IDLE_SLEEP_MS: ${EXECUTION_IDLE_SLEEP_MS:-50}
      EXECUTION_CALLBACK_ALLOW_PRIVATE_DESTINATIONS: ${EXECUTION_CALLBACK_ALLOW_PRIVATE_DESTINATIONS:-false}
      EXECUTION_CALLBACK_ALLOWED_HOSTS: ${EXECUTION_CALLBACK_ALLOWED_HOSTS:-callbacks.example.com}
      EXECUTION_QUEUE_JOB_MAX_ATTEMPTS: ${EXECUTION_QUEUE_JOB_MAX_ATTEMPTS:-25}
      EXECUTION_QUEUE_RETRY_BASE_DELAY_SECS: ${EXECUTION_QUEUE_RETRY_BASE_DELAY_SECS:-1}
      EXECUTION_QUEUE_RETRY_MAX_DELAY_SECS: ${EXECUTION_QUEUE_RETRY_MAX_DELAY_SECS:-300}

  reverse_proxy:
    image: azums/reverse_proxy:${AZUMS_IMAGE_TAG:-local}
    restart: unless-stopped
    depends_on:
      ingress_api:
        condition: service_started
      status_api:
        condition: service_started
    environment:
      REVERSE_PROXY_UPSTREAMS: ${REVERSE_PROXY_UPSTREAMS:-http://ingress_api:8081}
      REVERSE_PROXY_API_UPSTREAMS: ${REVERSE_PROXY_API_UPSTREAMS:-http://ingress_api:8081}
      REVERSE_PROXY_WEBHOOK_UPSTREAMS: ${REVERSE_PROXY_WEBHOOK_UPSTREAMS:-http://ingress_api:8081}
      REVERSE_PROXY_STATUS_UPSTREAMS: ${REVERSE_PROXY_STATUS_UPSTREAMS:-http://status_api:8082}
      REVERSE_PROXY_DEBUG_UPSTREAM_AUTH_HEADER_ENABLED: ${REVERSE_PROXY_DEBUG_UPSTREAM_AUTH_HEADER_ENABLED:-false}
      REVERSE_PROXY_EXPOSE_DEBUG_HEADERS: ${REVERSE_PROXY_EXPOSE_DEBUG_HEADERS:-false}
      REVERSE_PROXY_PUBLIC_PATH_ACL_ENABLED: ${REVERSE_PROXY_PUBLIC_PATH_ACL_ENABLED:-true}
      REVERSE_PROXY_STRIP_STATUS_PREFIX: ${REVERSE_PROXY_STRIP_STATUS_PREFIX:-true}
      REVERSE_PROXY_STRIP_API_PREFIX: ${REVERSE_PROXY_STRIP_API_PREFIX:-false}
      REVERSE_PROXY_STRIP_WEBHOOKS_PREFIX: ${REVERSE_PROXY_STRIP_WEBHOOKS_PREFIX:-false}
      REVERSE_PROXY_HEALTHCHECK: ${REVERSE_PROXY_HEALTHCHECK:-true}
    ports:
      - "${PROXY_HOST_PORT:-18000}:8000"
    networks:
      default:
        aliases:
          - reverse-proxy

volumes:
  postgres_data:
