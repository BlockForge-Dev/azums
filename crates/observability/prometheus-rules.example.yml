groups:
  - name: azums-platform
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(platform_http_requests_total{status_class="5xx"}[5m]))
          /
          clamp_min(sum(rate(platform_http_requests_total[5m])), 1)
          > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error ratio"
          description: "5xx ratio is above 5 percent for 10 minutes."

      - alert: LowTraffic
        expr: sum(rate(platform_http_requests_total[10m])) < 0.1
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "Traffic dropped"
          description: "Request volume is unexpectedly low."
