name: Docker Build Validation

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - manifest: apps/ingress_api/Cargo.toml
            bin: ingress_api
            image: ingress_api
          - manifest: crates/status_api/Cargo.toml
            bin: status_api
            image: status_api
          - manifest: apps/admin_cli/Cargo.toml
            bin: admin_cli
            image: execution_worker
          - manifest: apps/operator_ui/Cargo.toml
            bin: operator_ui
            image: operator_ui
          - manifest: crates/reverse-proxy/Cargo.toml
            bin: reverse_proxy
            image: reverse_proxy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/Dockerfile
          build-args: |
            APP_MANIFEST=${{ matrix.manifest }}
            BIN_NAME=${{ matrix.bin }}
          tags: azums/${{ matrix.image }}:ci
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
